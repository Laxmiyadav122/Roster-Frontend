<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard - DutySync</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <style>
    /* Basic Reset */
    * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
    body { background: #f4f6f9; color: #333; }

    .dashboard-container { min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: #2c3e50;
      color: #ecf0f1;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }
    .sidebar h2 { text-align: center; margin-bottom: 30px; color: white;}
    .sidebar ul { list-style: none; }
    .sidebar li {
      padding: 12px 10px;
      margin-bottom: 10px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .sidebar li:hover { background: #34495e; }

    /* Main content */
    .main-content {
      flex: 1;
      padding: 20px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .topbar h3 { color: #2c3e50; }
    .btn-outline {
      padding: 6px 12px;
      border: 1px solid #2c3e50;
      background: transparent;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn-outline:hover { background: #2c3e50; color: #fff; }

    /* Dashboard Cards */
    .dashboard-cards { display: flex; flex-wrap: wrap; gap: 20px; }
    .card, .create-duty { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); flex: 1; min-width: 250px; }
    .card h4 { margin-bottom: 10px; color: #2c3e50; }
    .card p { font-size: 24px; font-weight: bold; color: #2980b9; }

    /* Forms */
    form { display: flex; flex-direction: column; gap: 15px; }
    .form-group { display: flex; flex-direction: column; }
    .form-group label { margin-bottom: 5px; font-weight: bold; }
    .form-group input, .form-group select {
      padding: 8px 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    .btn-primary {
      padding: 10px 15px;
      background: #2980b9;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn-primary:hover { background: #3498db; }

    /* Analytics */
    .dashboard-analytics { margin-top: 20px; }
    canvas { max-width: 100%; }

    /* Nested sections */
    .create-duty h3, .assign-duty h3 { margin-bottom: 15px; color: #2c3e50; }
    .assign-duty { margin-top: 25px; }


/* Topbar */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
  background: #fff;
  padding: 10px 20px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.user-info span {
  font-weight: bold;
  margin-right: 15px;
}

.btn-outline {
  padding: 8px 15px;
  border: 2px solid #6c63ff;
  border-radius: 8px;
  background: #fff;
  color: #6c63ff;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}
.btn-outline:hover {
  background: #6c63ff;
  color: #fff;
}

/* Cards container */
.dashboard-cards {
  display: flex;
  flex-direction: column; /* Stack vertically */
  gap: 20px;
}

/* Individual card */
.card, .create-duty {
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

/* Buttons */
.btn-primary {
  width: 100%;
  text-align: center;
  padding: 12px;
  font-size: 16px;
}

/* Forms full width */
form {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

/* Make the main dashboard content slightly narrower */
.main-content {
  flex: 1;
  padding: 20px;
  max-width: 900px;    /* restrict width */
  margin: 0 auto;      /* center it */
}

/* Sidebar stays fixed width */
.sidebar {
  width: 200px;         /* slightly narrower */
  padding: 20px;
}

/* Stack dashboard cards vertically with a smaller gap */
.dashboard-cards {
  display: flex;
  flex-direction: column;
  gap: 15px;           /* slightly smaller spacing */
}

/* Reduce padding for cards slightly */
.card, .create-duty {
  padding: 15px;
}
  </style>
</head>
<body>
  <div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <h2>DutySync</h2>
      <ul>
        <li onclick="showSection('overview')">Overview</li>
        <li onclick="showSection('users')">Manage Users</li>
        <li onclick="showSection('duties')">Manage Duties</li>
        <li onclick="showSection('assignments')">Assignments</li>
        <li onclick="showSection('reports')">Reports</li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="topbar">
        <h3>Admin Dashboard</h3>
        <div class="user-info">
          <span id="welcomeUser">Welcome, Admin</span>
          <button onclick="logout()" class="btn-outline">Logout</button>
        </div>
      </div>

      <div class="dashboard-cards">
        <div class="card">
          <h4>Total Users</h4>
          <p id="totalUsers">0</p>
        </div>

        <div class="card">
          <h4>Total Duties</h4>
          <p id="totalDuties">0</p>
        </div>

        <div class="card">
          <h4>Pending Approvals</h4>
          <p id="pendingApprovals">0</p>
        </div>

        <!-- Duty Creation & Assignment -->
        <div class="create-duty">
          <h3>Create New Duty</h3>
          <form id="dutyForm">
            <div class="form-group">
              <label>Duty Title</label>
              <input type="text" id="dutyTitle" required />
            </div>
            <div class="form-group">
              <label>Duty Date</label>
              <input type="date" id="dutyDate" required />
            </div>
            <button type="submit" class="btn-primary">Add Duty</button>
          </form>

          <div class="assign-duty">
            <h3>Assign Duty</h3>
            <form id="assignForm">
              <div class="form-group">
                <label>Select Duty</label>
                <select id="dutySelect"></select>
              </div>
              <div class="form-group">
                <label>Select User</label>
                <select id="userSelect"></select>
              </div>
              <button type="submit" class="btn-primary">Assign</button>
            </form>
          </div>

          <div class="dashboard-analytics">
            <h3>Duty Performance by User</h3>
            <canvas id="userDutyChart" width="600" height="300"></canvas>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="footer-placeholder"></div>

  <script>
    fetch("components/footer.html")
      .then(res => res.text())
      .then(data => document.getElementById("footer-placeholder").innerHTML = data);
  </script>
  <script src="js/dashboard-auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/analytics.js"></script>
</body>
</html>
