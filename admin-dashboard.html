<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard - DutySync</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <h2>DutySync</h2>
      <ul>
        <li>Overview</li>
        <li>Manage Users</li>
        <li>Manage Duties</li>
        <li>Assignments</li>
        <li>Reports</li>
      </ul>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <h3>Admin Dashboard</h3>
        <div class="user-info">
          <span id="welcomeUser">Welcome, Admin</span>
          <button onclick="logout()" class="btn-outline">Logout</button>
        </div>
      </div>

      <div class="dashboard-cards">
        <div class="card">
          <h4>Total Users</h4>
          <p id="totalUsers">0</p>
        </div>

        <div class="card">
          <h4>Total Duties</h4>
          <p id="totalDuties">0</p>
        </div>

        <div class="card">
          <h4>Pending Approvals</h4>
          <p id="pendingApprovals">0</p>
        </div>

        <div class="create-duty">
          <h3>Create New Duty</h3>
          <form id="dutyForm">
            <div class="form-group">
              <label>Duty Title</label>
              <input type="text" id="dutyTitle" required />
            </div>
            <div class="form-group">
              <label>Duty Date</label>
              <input type="date" id="dutyDate" required />
            </div>
            <button type="submit" class="btn-primary">Add Duty</button>
          </form>

          <div class="assign-duty">
            <h3>Assign Duty</h3>
            <form id="assignForm">
              <div class="form-group">
                <label>Select Duty</label>
                <select id="dutySelect"></select>
              </div>
              <div class="form-group">
                <label>Select User</label>
                <select id="userSelect"></select>
              </div>
              <button type="submit" class="btn-primary">Assign</button>
            </form>
          </div>

          <div class="dashboard-analytics">
            <h3>Duty Performance by User</h3>
            <canvas id="userDutyChart" width="600" height="300"></canvas>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="footer-placeholder"></div>

  <script>
    fetch("components/footer.html")
      .then(res => res.text())
      .then(data => document.getElementById("footer-placeholder").innerHTML = data);
  </script>
  <script src="js/dashboard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/analytics.js"></script>
</body>
</html>
