<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>User Dashboard - DutySync</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>
  <body>
    <div class="dashboard-container">
      <aside class="sidebar">
        <h2>DutySync</h2>
        <ul>
          <li onclick="showSection('overview')">My Duties</li>
          <li onclick="showSection('completed')">Completed</li>
          <li onclick="showSection('skip')">Request Skip</li>
          <li onclick="showSection('swap')">Request Swap</li>
        </ul>
      </aside>

      <main class="main-content">
        <div class="topbar">
          <h3>User Dashboard</h3>
          <div class="user-info">
            <span id="welcomeUser"></span>
            <button onclick="logout()" class="btn-outline">Logout</button>
          </div>
        </div>

        <div class="dashboard-cards">
          <div class="card">
            <h4>Assigned Duties</h4>
            <p>4</p>
          </div>

          <div class="card">
            <h4>Completed Duties</h4>
            <p>2</p>
          </div>

          <div class="card">
            <h4>Pending Duties</h4>
            <p>2</p>
          </div>
        </div>

        <div class="content">
          <div id="overview" class="section">
            <h3>My Duties</h3>
            <div id="userDutyList"></div>
          </div>

          <div id="completed" class="section" style="display: none">
            <h3>Completed Duties</h3>
            <div id="completedList"></div>
          </div>

          <div id="skip" class="section" style="display: none">
            <h3>Request Skip</h3>
            <p id="skipDutySelect"></p>
            <input type="text" id="skipReason" placeholder="Reason for skip" />
            <button onclick="requestSkip()" id="ski">Submit</button>
            <div id="skipHistory"></div>
          </div>

          <div id="swap" class="section" style="display: none">
            <h3>Request Swap</h3>
            <p id="swapDutySelect"></p>
            <input type="text" id="swapReason" placeholder="Reason for swap" />
            <button onclick="requestSwap()" id="sp">Submit</button>
          </div>
        </div>
      </main>
    </div>
    <div id="footer-placeholder"></div>
    <script>
      fetch("components/footer.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("footer-placeholder").innerHTML = data;
        });
    </script>

    <script src="js/dashboard.js"></script>
  </body>
</html>
