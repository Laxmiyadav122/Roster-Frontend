<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>User Dashboard - DutySync</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <style>
            /* Sidebar */
    .sidebar {
      width: 220px;
      background: #2c3e50;
      color: #ecf0f1;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }
    .sidebar h2 { text-align: center; margin-bottom: 30px; color: white;}
    .sidebar ul { list-style: none; }
    .sidebar li {
      padding: 12px 10px;
      margin-bottom: 10px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .sidebar li:hover { background: #34495e; }

    .sidebar li a:link,
.sidebar li a:visited {
    color: white;
    text-decoration: none;
}

.sidebar li a:hover,
.sidebar li a:active,
.sidebar li a:focus {
    color: black;
}
    </style>
  </head>
  <body>
    <div class="dashboard-container">
      <aside class="sidebar">
        <h2>DutySync</h2>
        <ul>
          <li><a href="#">My Duties</a></li>
          <li><a href="#">Completed</a></li>
          <li><a href="#">Request Skip</a></li>
          <li><a href="#">Request Swap</a></li>
        </ul>
      </aside>

      <main class="main-content">
        <div class="topbar">
          <h3>User Dashboard</h3>
          <div class="user-info">
            <span id="welcomeUser"></span>
            <button onclick="logout()" class="btn-outline">Logout</button>
          </div>
        </div>

        <div class="dashboard-cards">
          <div class="card">
            <h4>Assigned Duties</h4>
            <p>4</p>
          </div>

          <div class="card">
            <h4>Completed Duties</h4>
            <p>2</p>
          </div>

          <div class="card">
            <h4>Pending Duties</h4>
            <p>2</p>
          </div>
        </div>
        <div class="duty-list">
          <h3>My Duties</h3>
          <div id="userDutyList"></div>
        </div>
      </main>
    </div>
    <div id="footer-placeholder"></div>
    <script>
      fetch("components/footer.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("footer-placeholder").innerHTML = data;
        });
    </script>

    <script src="js/dashboard-auth.js"></script>
    <script src="js/dashboard.js"></script>
  </body>
</html>
